name: Daily Institution News Scraper

on:
  # PAUSED — optimizing architecture to reduce API costs
  # To re-enable: uncomment the schedule block below
  # schedule:
  #   - cron: '0 0 * * *'   # Batch 1
  #   - cron: '0 2 * * *'   # Batch 2
  #   - cron: '0 4 * * *'   # Batch 3
  #   - cron: '0 6 * * *'   # Batch 4
  #   - cron: '0 8 * * *'   # Batch 5
  #   - cron: '0 9 * * *'   # Batch 6
  #   - cron: '0 10 * * *'  # Batch 7
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch (1-7 or 0=all)'
        required: false
        default: '0'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: cd scripts && npm install
      - name: Determine batch
        run: echo "BATCH=${{ github.event.inputs.batch || '0' }}" >> $GITHUB_ENV
      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ecuador_monitor }}
          BATCH: ${{ env.BATCH }}
        run: cd scripts && node scraper.js
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json public/archive/
          git diff --staged --quiet || git commit -m "chore: update news batch ${{ env.BATCH }} [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
