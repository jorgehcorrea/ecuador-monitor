name: Daily Institution News Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ecuador_monitor }}
        run: |
          cd scripts
          node scraper.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json public/archive/
          git diff --staged --quiet || git commit -m "chore: update news and archive [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
